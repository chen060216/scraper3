name: Scraper (main)

on:
  workflow_dispatch: 
  schedule:
    - cron: '*/10 * * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true

      - name: Run scraper
        env:
          USERNAME: ${{ secrets.NCHU_USERNAME }}
          PASSWORD: ${{ secrets.NCHU_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python main.py --check

      - name: Send completion notification
        if: always()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          python -c "from line_notify import send_line_message; import os; send_line_message(os.environ['LINE_CHANNEL_ACCESS_TOKEN'], '排程檢查 (scrape_check) 已經執行完畢')"
